<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Usuário</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      background: white;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      width: 300px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #2979ff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #2979ff;
    }

    p {
      font-size: 14px;
      color: #555;
    }

    a {
      color: #2979ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  
  <form id="registroForm">
    <h2>Registrar Usuário</h2>
    <input type="text" id="nome" placeholder="Nome" required /><br><br>
    <input type="email" id="email" placeholder="Email" required /><br><br>
    <input type="password" id="senha" placeholder="Senha" required /><br><br>
    <button type="submit">Registrar</button>
    <p>Já tem uma conta ? <br> <a href="/views/login.html">Inicia sessão aqui</a></p>
    <p id="mensagem"></p>
  </form>


  <script>
    const AUTH_POST = "https://safegas-angola.onrender.com/auth/post/";

    document.getElementById("registroForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      const usuario = {
        name: nome,
        email: email,
        password: senha
      };

      try {
        const resposta = await fetch(AUTH_POST, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(usuario)
        });

        const dados = await resposta.json();

        if (resposta.ok) {
          localStorage.setItem("usuarioId", dados.id);
          document.getElementById("mensagem").textContent = "Usuário registrado com sucesso!";
          localStorage.setItem("usuarioNome", usuario.name || "Desconhecido");
          const nome = localStorage.getItem("usuarioNome");
          window.location.href='/index.htm'
        } else {
          document.getElementById("mensagem").textContent = `Erro: ${dados.message || "Não foi possível registrar."}`;
        }

      } catch (erro) {
        document.getElementById("mensagem").textContent = "Erro de conexão com a API.";
        console.error(erro);
      }
    });
  </script>
</body>
</html>
